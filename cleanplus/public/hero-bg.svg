<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#112240;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2444;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="g2" cx="80%" cy="20%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#g1)"/>
  <rect width="1200" height="700" fill="url(#g2)"/>
  <!-- Subtle geometric lines -->
  <line x1="0" y1="350" x2="1200" y2="350" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="700" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.05"/>
  <!-- Decorative circle -->
  <circle cx="900" cy="200" r="300" fill="none" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.06"/>
  <circle cx="900" cy="200" r="200" fill="none" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.04"/>
</svg>
